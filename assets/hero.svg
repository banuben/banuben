<svg width="1600" height="500" viewBox="0 0 1600 500" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="500">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="100%" stop-color="#07111D"/>
    </linearGradient>

    <!-- Emerald Glow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft Glow -->
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="35" result="blur"/>
    </filter>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#0F2230" stroke-width="1"/>
    </pattern>

    <!-- Data Stream -->
    <linearGradient id="stream" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="#00FFB2"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1600" height="500" fill="url(#bg)"/>

  <!-- Grid -->
  <rect width="1600" height="500" fill="url(#grid)" opacity="0.18"/>

  <!-- Ambient Glow -->
  <circle cx="1250" cy="120" r="180" fill="#00FFB2" opacity="0.08" filter="url(#softGlow)"/>
  <circle cx="350" cy="380" r="160" fill="#00FFB2" opacity="0.05" filter="url(#softGlow)"/>

  <!-- Data Streams -->
  <g opacity="0.35">
    <rect x="1050" y="80" width="260" height="1.5" fill="url(#stream)"/>
    <rect x="1180" y="150" width="180" height="1.5" fill="url(#stream)"/>
    <rect x="1220" y="220" width="220" height="1.5" fill="url(#stream)"/>
    <rect x="1080" y="310" width="260" height="1.5" fill="url(#stream)"/>
    <rect x="1150" y="390" width="200" height="1.5" fill="url(#stream)"/>
  </g>

  <!-- Accent Lines -->
  <line x1="120" y1="90" x2="320" y2="90" stroke="#00FFB2" stroke-width="2" opacity="0.8"/>
  <line x1="120" y1="410" x2="420" y2="410" stroke="#00FFB2" stroke-width="2" opacity="0.4"/>

  <!-- Label -->
  <text
    x="120"
    y="70"
    fill="#00FFB2"
    font-family="Inter, Arial, sans-serif"
    font-size="18"
    font-weight="700"
    letter-spacing="5">
    SYSTEMS ENGINEER
  </text>

  <!-- Main Heading Glow -->
  <text
    x="120"
    y="180"
    fill="#00FFB2"
    opacity="0.25"
    filter="url(#glow)"
    font-family="Inter, Arial, sans-serif"
    font-size="82"
    font-weight="800">
    BUILDING
  </text>

  <text
    x="120"
    y="260"
    fill="#00FFB2"
    opacity="0.25"
    filter="url(#glow)"
    font-family="Inter, Arial, sans-serif"
    font-size="82"
    font-weight="800">
    INTELLIGENT
  </text>

  <text
    x="120"
    y="340"
    fill="#00FFB2"
    opacity="0.25"
    filter="url(#glow)"
    font-family="Inter, Arial, sans-serif"
    font-size="82"
    font-weight="800">
    SYSTEMS
  </text>

  <!-- Main Heading -->
  <text
    x="120"
    y="180"
    fill="#FFFFFF"
    font-family="Inter, Arial, sans-serif"
    font-size="82"
    font-weight="800">
    BUILDING
  </text>

  <text
    x="120"
    y="260"
    fill="#FFFFFF"
    font-family="Inter, Arial, sans-serif"
    font-size="82"
    font-weight="800">
    INTELLIGENT
  </text>

  <text
    x="120"
    y="340"
    fill="#FFFFFF"
    font-family="Inter, Arial, sans-serif"
    font-size="82"
    font-weight="800">
    SYSTEMS
  </text>

  <!-- Subtitle -->
  <text
    x="120"
    y="395"
    fill="#A6B4C3"
    font-family="Inter, Arial, sans-serif"
    font-size="24"
    font-weight="400">
    Full Stack Engineer specializing in
  </text>

  <text
    x="120"
    y="428"
    fill="#A6B4C3"
    font-family="Inter, Arial, sans-serif"
    font-size="24"
    font-weight="400">
    AI Systems, Backend Architecture,
  </text>

  <text
    x="120"
    y="461"
    fill="#A6B4C3"
    font-family="Inter, Arial, sans-serif"
    font-size="24"
    font-weight="400">
    and Production Software.
  </text>

  <!-- Right Panel -->
  <g transform="translate(1080 120)">
    <rect
      width="360"
      height="260"
      rx="20"
      fill="rgba(10,16,28,0.75)"
      stroke="#123444"
      stroke-width="1.5"/>

    <text
      x="30"
      y="45"
      fill="#00FFB2"
      font-family="Inter, Arial, sans-serif"
      font-size="18"
      font-weight="700">
      ━━━━━━━━━━━━━━━━━━━━━━━━━━
    </text>

    <text
      x="30"
      y="95"
      fill="#FFFFFF"
      font-family="Inter, Arial, sans-serif"
      font-size="24"
      font-weight="700">
      Current Focus:
    </text>

    <text
      x="30"
      y="145"
      fill="#C7D2DE"
      font-family="Inter, Arial, sans-serif"
      font-size="20">
      • AI Assistant Platforms
    </text>

    <text
      x="30"
      y="185"
      fill="#C7D2DE"
      font-family="Inter, Arial, sans-serif"
      font-size="20">
      • Scalable Architectures
    </text>

    <text
      x="30"
      y="225"
      fill="#C7D2DE"
      font-family="Inter, Arial, sans-serif"
      font-size="20">
      • Workflow Automation
    </text>

    <text
      x="30"
      y="255"
      fill="#00FFB2"
      font-family="Inter, Arial, sans-serif"
      font-size="18"
      font-weight="700">
      ━━━━━━━━━━━━━━━━━━━━━━━━━━
    </text>
  </g>

</svg>
