<svg width="1600" height="520" viewBox="0 0 1600 520" fill="none" xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="bg" x1="0" y1="0" x2="1600" y2="520">
<stop offset="0%" stop-color="#050816"/>
<stop offset="100%" stop-color="#0B1120"/>
</linearGradient>

<linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
<stop offset="0%" stop-color="#00FFB2"/>
<stop offset="100%" stop-color="#00D8FF"/>
</linearGradient>

<filter id="glow">
<feGaussianBlur stdDeviation="12"/>
</filter>

</defs>

<!-- Background -->

<rect width="1600" height="520" fill="url(#bg)"/>

<!-- Ambient Glow -->

<circle cx="1180"
        cy="260"
        r="240"
        fill="#00FFB2"
        opacity="0.05"
        filter="url(#glow)"/>

<!-- Header -->

<text
x="120"
y="95"
fill="#00FFB2"
font-size="13"
font-family="Inter"
font-weight="700"
letter-spacing="4">
SYSTEMS ENGINEER
</text>

<text
x="120"
y="170"
fill="#F8FAFC"
font-size="54"
font-family="Inter"
font-weight="700">
Building Intelligent Systems
</text>

<text
x="120"
y="225"
fill="#94A3B8"
font-size="22"
font-family="Inter">
Designing scalable platforms,
</text>

<text
x="120"
y="258"
fill="#94A3B8"
font-size="22"
font-family="Inter">
AI-powered products,
</text>

<text
x="120"
y="291"
fill="#94A3B8"
font-size="22"
font-family="Inter">
and production-grade software.
</text>

<!-- Architecture Pipeline -->

<g transform="translate(720,250)">

<!-- Main Rail -->

<line
x1="0"
y1="0"
x2="720"
y2="0"
stroke="#223244"
stroke-width="2"/>

<!-- Flow Glow -->

<line
x1="0"
y1="0"
x2="720"
y2="0"
stroke="#00FFB2"
stroke-opacity="0.18"
stroke-width="2"/>

<!-- Animated Packet -->

<circle r="4" fill="#00FFB2">

<animateMotion
dur="7s"
repeatCount="indefinite"
path="M0 0 L720 0"/>

</circle>

<!-- Stage 1 -->

<circle cx="0" cy="0" r="12"
fill="#0F172A"
stroke="#00FFB2"/>

<text x="-45"
      y="-30"
      fill="#E2E8F0"
      font-size="15">
Intelligence
</text>

<!-- Stage 2 -->

<circle cx="180" cy="0" r="12"
fill="#0F172A"
stroke="#00FFB2"/>

<text x="145"
      y="-30"
      fill="#E2E8F0"
      font-size="15">
Context
</text>

<!-- Stage 3 -->

<circle cx="360" cy="0" r="12"
fill="#0F172A"
stroke="#00FFB2"/>

<text x="325"
      y="-30"
      fill="#E2E8F0"
      font-size="15">
Decision
</text>

<!-- Stage 4 -->

<circle cx="540" cy="0" r="12"
fill="#0F172A"
stroke="#00FFB2"/>

<text x="495"
      y="-30"
      fill="#E2E8F0"
      font-size="15">
Automation
</text>

<!-- Final -->

<circle cx="720"
        cy="0"
        r="15"
        fill="#00FFB2">

<animate
attributeName="r"
values="15;20;15"
dur="4s"
repeatCount="indefinite"/>

</circle>

<text x="685"
      y="-30"
      fill="#E2E8F0"
      font-size="15">
Products
</text>

<!-- Specialty Branches -->

<line x1="0" y1="0" x2="0" y2="60" stroke="#223244"/>
<line x1="180" y1="0" x2="180" y2="60" stroke="#223244"/>
<line x1="360" y1="0" x2="360" y2="60" stroke="#223244"/>
<line x1="540" y1="0" x2="540" y2="60" stroke="#223244"/>
<line x1="720" y1="0" x2="720" y2="60" stroke="#223244"/>

<!-- Specialties -->

<text x="-60"
      y="90"
      fill="#94A3B8"
      font-size="14">
Agent Systems
</text>

<text x="130"
      y="90"
      fill="#94A3B8"
      font-size="14">
RAG Systems
</text>

<text x="300"
      y="90"
      fill="#94A3B8"
      font-size="14">
Backend APIs
</text>

<text x="465"
      y="90"
      fill="#94A3B8"
      font-size="14">
Workflow Engine
</text>

<text x="650"
      y="90"
      fill="#94A3B8"
      font-size="14">
Learning Platform
</text>

</g>

<!-- Bottom Rail -->

<line
x1="120"
y1="445"
x2="1480"
y2="445"
stroke="#182739"/>

<text
x="120"
y="475"
fill="#64748B"
font-size="13"
font-family="Inter">
AI Systems • Agent Architectures • Backend Engineering • Workflow Automation • Learning Platforms
</text>

</svg>
