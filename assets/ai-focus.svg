<svg width="1400" height="700" viewBox="0 0 1400 700" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <!-- Background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="700">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="100%" stop-color="#08111D"/>
    </linearGradient>

    <!-- Dot Grid -->
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#132235"/>
    </pattern>

    <!-- Emerald -->
    <linearGradient id="emerald" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00FFB2"/>
      <stop offset="100%" stop-color="#00D8FF"/>
    </linearGradient>

    <!-- Glow -->
    <filter id="glow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Ambient -->
    <filter id="ambient">
      <feGaussianBlur stdDeviation="70"/>
    </filter>

  </defs>

  <!-- Background -->
  <rect width="1400" height="700" fill="url(#bg)"/>
  <rect width="1400" height="700" fill="url(#dots)" opacity="0.35"/>

  <!-- Ambient Lighting -->
  <circle cx="350" cy="120" r="180" fill="#00FFB2" opacity="0.04" filter="url(#ambient)"/>
  <circle cx="1080" cy="560" r="220" fill="#00D8FF" opacity="0.04" filter="url(#ambient)"/>

  <!-- CONNECTIONS -->

  <g stroke="url(#emerald)" stroke-width="1.2" opacity="0.28">

    <line x1="700" y1="350" x2="700" y2="120"/>
    <line x1="700" y1="350" x2="700" y2="585"/>

    <line x1="700" y1="350" x2="430" y2="220"/>
    <line x1="700" y1="350" x2="970" y2="220"/>

    <line x1="700" y1="350" x2="280" y2="350"/>
    <line x1="700" y1="350" x2="1120" y2="350"/>

    <line x1="700" y1="350" x2="420" y2="500"/>
    <line x1="700" y1="350" x2="980" y2="500"/>

  </g>

  <!-- CENTER CORE -->

  <g>

    <!-- Outer Ring -->
    <circle
      cx="700"
      cy="350"
      r="130"
      stroke="#1A3246"
      stroke-width="1.5"/>

    <circle
      cx="700"
      cy="350"
      r="130"
      stroke="#00FFB2"
      opacity="0.08"
      filter="url(#glow)"/>

    <!-- Inner Ring -->
    <circle
      cx="700"
      cy="350"
      r="92"
      stroke="#1C4252"
      stroke-width="1"/>

    <!-- Hexagon -->
    <polygon
      points="
      700,275
      765,312
      765,388
      700,425
      635,388
      635,312"
      fill="none"
      stroke="url(#emerald)"
      stroke-width="2"/>

    <!-- Core Dot -->
    <circle
      cx="700"
      cy="350"
      r="12"
      fill="#00FFB2"/>

    <!-- Text -->
    <text
      x="700"
      y="330"
      text-anchor="middle"
      fill="#FFFFFF"
      font-family="Inter,Arial,sans-serif"
      font-size="15"
      font-weight="600"
      letter-spacing="4">
      AI
    </text>

    <text
      x="700"
      y="380"
      text-anchor="middle"
      fill="#FFFFFF"
      font-family="Inter,Arial,sans-serif"
      font-size="42"
      font-weight="800">
      ENGINEERING
    </text>

  </g>

  <!-- NODE STYLE TEMPLATE REUSED -->

  <!-- TOP -->
  <g>
    <rect x="600" y="80" width="200" height="44" rx="22"
          fill="#0A1320"
          stroke="#1D3A48"/>
    <text x="700" y="108"
          text-anchor="middle"
          fill="#FFFFFF"
          font-size="15"
          font-family="Inter,Arial">
          Multi Provider AI
    </text>
  </g>

  <!-- UPPER LEFT -->
  <g>
    <rect x="320" y="198" width="220" height="44" rx="22"
          fill="#0A1320"
          stroke="#1D3A48"/>
    <text x="430" y="226"
          text-anchor="middle"
          fill="#FFFFFF"
          font-size="15">
          Agent Architectures
    </text>
  </g>

  <!-- UPPER RIGHT -->
  <g>
    <rect x="860" y="198" width="220" height="44" rx="22"
          fill="#0A1320"
          stroke="#1D3A48"/>
    <text x="970" y="226"
          text-anchor="middle"
          fill="#FFFFFF"
          font-size="15">
          RAG Systems
    </text>
  </g>

  <!-- LEFT -->
  <g>
    <rect x="170" y="328" width="220" height="44" rx="22"
          fill="#0A1320"
          stroke="#1D3A48"/>
    <text x="280" y="356"
          text-anchor="middle"
          fill="#FFFFFF"
          font-size="15">
          Memory Layer
    </text>
  </g>

  <!-- RIGHT -->
  <g>
    <rect x="1010" y="328" width="220" height="44" rx="22"
          fill="#0A1320"
          stroke="#1D3A48"/>
    <text x="1120" y="356"
          text-anchor="middle"
          fill="#FFFFFF"
          font-size="15">
          Tool Calling
    </text>
  </g>

  <!-- LOWER LEFT -->
  <g>
    <rect x="300" y="478" width="240" height="44" rx="22"
          fill="#0A1320"
          stroke="#1D3A48"/>
    <text x="420" y="506"
          text-anchor="middle"
          fill="#FFFFFF"
          font-size="15">
          Document Processing
    </text>
  </g>

  <!-- LOWER RIGHT -->
  <g>
    <rect x="860" y="478" width="240" height="44" rx="22"
          fill="#0A1320"
          stroke="#1D3A48"/>
    <text x="980" y="506"
          text-anchor="middle"
          fill="#FFFFFF"
          font-size="15">
          Vector Search
    </text>
  </g>

  <!-- BOTTOM -->
  <g>
    <rect x="590" y="563" width="220" height="44" rx="22"
          fill="#0A1320"
          stroke="#1D3A48"/>
    <text x="700" y="591"
          text-anchor="middle"
          fill="#FFFFFF"
          font-size="15">
          Workflow Engine
    </text>
  </g>

</svg>
