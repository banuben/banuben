<svg width="1600" height="180" viewBox="0 0 1600 180" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <!-- Background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="180">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="100%" stop-color="#08111D"/>
    </linearGradient>

    <!-- Emerald Glow -->
    <filter id="glow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Ambient -->
    <filter id="ambient">
      <feGaussianBlur stdDeviation="30"/>
    </filter>

    <!-- Emerald Gradient -->
    <linearGradient id="line" x1="0" y1="0" x2="1600" y2="0">
      <stop offset="0%" stop-color="#00FFB2" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00FFB2"/>
      <stop offset="100%" stop-color="#00FFB2" stop-opacity="0"/>
    </linearGradient>

  </defs>

  <!-- Background -->
  <rect width="1600" height="180" fill="url(#bg)"/>

  <!-- Ambient Glow -->
  <circle cx="800" cy="90" r="220"
          fill="#00FFB2"
          opacity="0.04"
          filter="url(#ambient)"/>

  <!-- Subtle Particles -->
  <g opacity="0.35">

    <circle cx="180" cy="60" r="1.2" fill="#00FFB2"/>
    <circle cx="260" cy="120" r="1" fill="#00FFB2"/>
    <circle cx="340" cy="40" r="1.3" fill="#00FFB2"/>

    <circle cx="520" cy="135" r="1" fill="#00FFB2"/>
    <circle cx="620" cy="55" r="1.2" fill="#00FFB2"/>

    <circle cx="980" cy="50" r="1.1" fill="#00FFB2"/>
    <circle cx="1080" cy="130" r="1.2" fill="#00FFB2"/>

    <circle cx="1260" cy="70" r="1" fill="#00FFB2"/>
    <circle cx="1380" cy="115" r="1.3" fill="#00FFB2"/>
    <circle cx="1450" cy="55" r="1" fill="#00FFB2"/>

  </g>

  <!-- Glow Line -->
  <line
    x1="250"
    y1="90"
    x2="1350"
    y2="90"
    stroke="url(#line)"
    stroke-width="1.5"
    filter="url(#glow)"/>

  <!-- Center Marker -->
  <circle
    cx="800"
    cy="90"
    r="3"
    fill="#00FFB2"
    filter="url(#glow)"/>

  <!-- Text -->
  <text
    x="800"
    y="78"
    text-anchor="middle"
    fill="#FFFFFF"
    font-family="Inter, Arial, sans-serif"
    font-size="26"
    font-weight="700">
    Designed for Scale.
  </text>

  <text
    x="800"
    y="116"
    text-anchor="middle"
    fill="#A7B5C5"
    font-family="Inter, Arial, sans-serif"
    font-size="24"
    font-weight="500">
    Built for Production.
  </text>

</svg>
