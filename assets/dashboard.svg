<svg width="1600" height="800" viewBox="0 0 1600 800" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <!-- Background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="800">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="100%" stop-color="#09111E"/>
    </linearGradient>

    <!-- Card Gradient -->
    <linearGradient id="cardBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0C1322"/>
      <stop offset="100%" stop-color="#09111A"/>
    </linearGradient>

    <!-- Emerald Glow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft Ambient Glow -->
    <filter id="ambient">
      <feGaussianBlur stdDeviation="60"/>
    </filter>

    <!-- Grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#102131" stroke-width="1"/>
    </pattern>

  </defs>

  <!-- Background -->
  <rect width="1600" height="800" fill="url(#bg)"/>

  <!-- Grid -->
  <rect width="1600" height="800" fill="url(#grid)" opacity="0.22"/>

  <!-- Ambient Lights -->
  <circle cx="1350" cy="120" r="220" fill="#00FFB2" opacity="0.08" filter="url(#ambient)"/>
  <circle cx="250" cy="700" r="240" fill="#00FFB2" opacity="0.05" filter="url(#ambient)"/>

  <!-- Top Header -->
  <text x="80" y="80"
        fill="#00FFB2"
        font-size="16"
        font-weight="700"
        font-family="Inter, Arial"
        letter-spacing="4">
        AI ENGINEERING DASHBOARD
  </text>

  <text x="80" y="145"
        fill="#FFFFFF"
        font-size="54"
        font-weight="800"
        font-family="Inter, Arial">
        Systems Overview
  </text>

  <text x="80" y="190"
        fill="#91A4B8"
        font-size="22"
        font-family="Inter, Arial">
        Building scalable AI products and production-grade software systems.
  </text>

  <!-- CARD 1 -->
  <g>
    <rect x="80" y="250"
          width="700"
          height="230"
          rx="28"
          fill="url(#cardBg)"
          stroke="#1B4B41"
          stroke-width="1.4"/>

    <rect x="80" y="250"
          width="700"
          height="230"
          rx="28"
          stroke="#00FFB2"
          opacity="0.15"
          filter="url(#glow)"/>

    <text x="120" y="315"
          fill="#00FFB2"
          font-size="16"
          font-weight="700"
          font-family="Inter, Arial">
          BACKGROUND
    </text>

    <text x="120" y="405"
          fill="#FFFFFF"
          font-size="58"
          font-weight="800"
          font-family="Inter, Arial">
          Data &amp; AI
    </text>

    <text x="120" y="465"
          fill="#FFFFFF"
          font-size="58"
          font-weight="800"
          font-family="Inter, Arial">
          Engineering
    </text>
  </g>

  <!-- CARD 2 -->
  <g>
    <rect x="820" y="250"
          width="700"
          height="230"
          rx="28"
          fill="url(#cardBg)"
          stroke="#1B4B41"
          stroke-width="1.4"/>

    <rect x="820" y="250"
          width="700"
          height="230"
          rx="28"
          stroke="#00FFB2"
          opacity="0.15"
          filter="url(#glow)"/>

    <text x="860" y="315"
          fill="#00FFB2"
          font-size="16"
          font-weight="700"
          font-family="Inter, Arial">
          CURRENT FOCUS
    </text>

    <text x="860" y="385"
          fill="#FFFFFF"
          font-size="34"
          font-weight="700"
          font-family="Inter, Arial">
          AI Systems
    </text>

    <text x="860" y="430"
          fill="#FFFFFF"
          font-size="34"
          font-weight="700"
          font-family="Inter, Arial">
          Backend Architecture
    </text>

    <text x="860" y="475"
          fill="#FFFFFF"
          font-size="34"
          font-weight="700"
          font-family="Inter, Arial">
          Full Stack Development
    </text>
  </g>

  <!-- CARD 3 -->
  <g>
    <rect x="80" y="520"
          width="700"
          height="220"
          rx="28"
          fill="url(#cardBg)"
          stroke="#1B4B41"
          stroke-width="1.4"/>

    <rect x="80" y="520"
          width="700"
          height="220"
          rx="28"
          stroke="#00FFB2"
          opacity="0.15"
          filter="url(#glow)"/>

    <text x="120" y="585"
          fill="#00FFB2"
          font-size="16"
          font-weight="700"
          font-family="Inter, Arial">
          PRIMARY STACK
    </text>

    <text x="120" y="660"
          fill="#FFFFFF"
          font-size="34"
          font-weight="700"
          font-family="Inter, Arial">
          Next.js
    </text>

    <text x="330" y="660"
          fill="#FFFFFF"
          font-size="34"
          font-weight="700"
          font-family="Inter, Arial">
          NestJS
    </text>

    <text x="520" y="660"
          fill="#FFFFFF"
          font-size="34"
          font-weight="700"
          font-family="Inter, Arial">
          GraphQL
    </text>

    <text x="120" y="710"
          fill="#FFFFFF"
          font-size="34"
          font-weight="700"
          font-family="Inter, Arial">
          MongoDB
    </text>
  </g>

  <!-- CARD 4 -->
  <g>
    <rect x="820" y="520"
          width="700"
          height="220"
          rx="28"
          fill="url(#cardBg)"
          stroke="#1B4B41"
          stroke-width="1.4"/>

    <rect x="820" y="520"
          width="700"
          height="220"
          rx="28"
          stroke="#00FFB2"
          opacity="0.15"
          filter="url(#glow)"/>

    <text x="860" y="585"
          fill="#00FFB2"
          font-size="16"
          font-weight="700"
          font-family="Inter, Arial">
          BUILDING
    </text>

    <text x="860" y="650"
          fill="#FFFFFF"
          font-size="34"
          font-weight="700"
          font-family="Inter, Arial">
          AI Assistant Platform
    </text>

    <text x="860" y="695"
          fill="#FFFFFF"
          font-size="34"
          font-weight="700"
          font-family="Inter, Arial">
          Learning Platform
    </text>

    <text x="1200" y="695"
          fill="#FFFFFF"
          font-size="34"
          font-weight="700"
          font-family="Inter, Arial">
          Workflow Systems
    </text>
  </g>

</svg>
